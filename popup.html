<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #f0f6fc;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .icon {
      font-size: 18px;
    }
    .setting-group {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .setting-row + .setting-row {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #21262d;
    }
    .setting-label {
      font-size: 13px;
      color: #c9d1d9;
    }
    .setting-hint {
      font-size: 11px;
      color: #8b949e;
      margin-top: 3px;
    }
    /* Toggle switch */
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #30363d;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #c9d1d9;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #238636;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    /* Select dropdown */
    select {
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }
    select:focus {
      border-color: #58a6ff;
    }
    .saved-msg {
      text-align: center;
      font-size: 12px;
      color: #3fb950;
      opacity: 0;
      transition: opacity 0.3s;
      margin-top: 6px;
    }
    .saved-msg.visible {
      opacity: 1;
    }
    .sub-settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #21262d;
      transition: opacity 0.2s;
    }
    .sub-settings.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1><span class="icon">⇅</span> GitHub File Sorter</h1>
  <div class="setting-group">
    <div class="setting-row">
      <div>
        <div class="setting-label">Auto-sort on page load</div>
        <div class="setting-hint">Automatically sort files when you open a repo folder</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="autoSortEnabled">
        <span class="slider"></span>
      </label>
    </div>
    <div class="sub-settings" id="subSettings">
      <div class="setting-row">
        <div class="setting-label">Sort by</div>
        <select id="autoSortColumn">
          <option value="date">Last commit date</option>
          <option value="name">Name</option>
          <option value="message">Last commit message</option>
        </select>
      </div>
      <div class="setting-row">
        <div class="setting-label">Direction</div>
        <select id="autoSortDirection">
          <option value="desc">Newest first</option>
          <option value="asc">Oldest first</option>
        </select>
      </div>
    </div>
  </div>
  <div class="saved-msg" id="savedMsg">✓ Settings saved</div>
  <script src="popup.js"></script>
</body>
</html>
